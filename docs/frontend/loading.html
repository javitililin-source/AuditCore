<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuditCore - Cargando</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:#0F1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:700px;
background:#161B22;
padding:50px;
border-radius:18px;
box-shadow:0px 0px 25px rgba(0,0,0,.45);
}

h1{
font-size:38px;
margin-bottom:20px;
text-align:center;
}

.subtitle{
text-align:center;
color:#9CA3AF;
margin-bottom:35px;
}

.progress{
width:100%;
height:22px;
background:#2D3748;
border-radius:20px;
overflow:hidden;
margin-bottom:35px;
}

.progress-bar{
width:35%;
height:100%;
background:#2563EB;
}

.status{
line-height:35px;
font-size:17px;
}

.ok{
color:#22C55E;
}

.wait{
color:#F59E0B;
}

</style>

</head>

<body>

<div class="container">

<h1>🛡️ AuditCore</h1>

<p class="subtitle">
Inicializando evaluación...
</p>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="status">

<div class="ok">
✔ Conectando con Microsoft Graph
</div>

<div class="ok">
✔ Conectando con Exchange Online
</div>

<div class="wait">
⏳ Obteniendo configuración...
</div>

</div>

</div>

</body>

</html>
