<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AuditCore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{

background:#0F1117;

color:white;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.container{

text-align:center;

background:#161B22;

padding:60px;

border-radius:18px;

width:700px;

box-shadow:0px 0px 25px rgba(0,0,0,.45);

}

.logo{

font-size:55px;

margin-bottom:15px;

}

h1{

font-size:45px;

margin-bottom:10px;

}

.subtitle{

color:#9CA3AF;

font-size:20px;

margin-bottom:45px;

}

.button{

display:inline-block;

background:#2563EB;

padding:18px 35px;

border-radius:10px;

text-decoration:none;

color:white;

font-size:18px;

font-weight:bold;

transition:.3s;

}

.button:hover{

background:#1D4ED8;

transform:scale(1.05);

}

.footer{

margin-top:50px;

color:#6B7280;

font-size:14px;

}

.version{

margin-top:10px;

color:#9CA3AF;

font-size:15px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🛡️

</div>

<h1>AuditCore</h1>

<p class="subtitle">

Plataforma de Auditoría y Cumplimiento Tecnológico

</p>

<a href="#" class="button">

Iniciar Evaluación

</a>

<div class="footer">

Desarrollado para Auditoría de TI

<div class="version">

Versión 0.1

</div>

</div>

</div>

</body>

</html>
